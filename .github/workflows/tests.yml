name: Unit Tests

on:
  push: {}
  workflow_dispatch: {}
  pull_request: {}

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: [
          "3.10", "3.11", "3.12", "3.13", 
          # spacy makes problems in 3.14. ToDo fix this...
          #"3.14"
        ]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          java-version: 11
      - name: Install the lsr-benchmark from the repo
        working-directory: ${{github.workspace}}
        run: |
          pip3 install -e .[dev,test]
      - name: Run unit tests
        working-directory: ${{github.workspace}}/
        run: |
          pytest
